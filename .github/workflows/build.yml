name: Build Windows EXE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install PySide6 PyInstaller

      - name: Build EXE
        run: |
          cp -r src src_win
          echo "import sys; sys.path.insert(0, 'src_win')" | cat - src/radiocodes/main.py > src_win/radiocodes/main_tmp.py
          mv src_win/radiocodes/main_tmp.py src_win/radiocodes/main.py
          pyinstaller --name RadioUnlock --windowed --onefile ^
            --add-data "src_win/radiocodes/algorithms/vw_rcd_lookup.py;radiocodes/algorithms" ^
            --add-data "src_win/radiocodes/algorithms/renault_lookup.py;radiocodes/algorithms" ^
            --add-data "data;data" ^
            --hidden-import=PySide6 ^
            --hidden-import=PySide6.QtCore ^
            --hidden-import=PySide6.QtGui ^
            --hidden-import=PySide6.QtWidgets ^
            --collect-all=PySide6 ^
            src_win/radiocodes/main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: RadioUnlock-Windows
          path: dist/RadioUnlock.exe
          compression-method: zip

      - name: Upload data files
        uses: actions/upload-artifact@v4
        with:
          name: RadioUnlock-Data
          path: data/
